name: yuni_image_crop
description: A new Flutter package for image cropping, based on extended_image.
version: 0.0.1
homepage: https://github.com/lurongshuang/yuni_image_crop 

environment:
  sdk: '>=3.10.0 <4.0.0'
  flutter: ">=3.3.0"

dependencies:
  flutter:
    sdk: flutter
  extended_image: ^10.0.1
  flutter_image_compress: ^2.4.0
  path_provider: ^2.1.5
  yuni_widget: ^0.1.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
